<!DOCTYPE html>
<html>
<head>
    <title>User Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="card mx-auto shadow-lg" style="max-width: 400px;">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Create Account</h3>
                <form method="POST">
                    <input type="text" name="username" class="form-control mb-3" placeholder="Choose Username" required>
                    <input type="password" name="password" class="form-control mb-3" placeholder="Create Password" required>
                    <button class="btn btn-primary w-100 mb-3">Sign Up</button>
                    <a href="/login" class="d-block text-center text-muted small">Already have an account? Login</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
